<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Gisella & Maciel</title>
  <link rel="stylesheet" href="style.css">

  <link href="https://fonts.googleapis.com/css2?family=Great+Vibes&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
</head>
<body>

<!-- PANTALLA INICIAL -->
<div id="intro">
  <div class="card">
    <p>Tenés una invitación</p>
    <button onclick="abrirInvitacion()">Abrir</button>
  </div>
</div>

<!-- CONTENIDO -->
<div id="contenido">

  <!-- HERO -->
  <section class="hero">
    <div class="overlay">
      <h1>Gisella & Maciel</h1>
      <p>¡Nos casamos!</p>
    </div>
  </section>

  <!-- CONTADOR -->
  <section class="section">
    <h2>Faltan</h2>
    <div id="countdown"></div>
  </section>

  <!-- INFO -->
  <section class="section">
    <h2>Detalles</h2>
    <p>📅 15 de Noviembre 2026</p>
    <p>🕒 20:00 hs</p>
    <p>📍 Salón Los Olivos, Mendoza</p>

    <a class="btn" href="https://www.google.com/maps?q=Mendoza" target="_blank">
      Cómo llegar
    </a>
  </section>

  <!-- GALERÍA -->
  <section class="section">
    <h2>Momentos</h2>
    <div class="galeria">
      <img src="foto1.jpg">
      <img src="foto2.jpg">
      <img src="foto3.jpg">
    </div>
  </section>

  <!-- CONFIRMAR -->
  <section class="section">
    <h2>Confirmar asistencia</h2>

    <a class="btn" href="https://forms.gle/TU_LINK" target="_blank">
      Confirmar
    </a>

    <a class="btn whatsapp" href="https://wa.me/549261XXXXXXX" target="_blank">
      WhatsApp
    </a>
  </section>

  <footer>
    <p>Te esperamos 💍</p>
  </footer>

</div>

<!-- MÚSICA -->
<audio id="musica" loop>
  <source src="musica.mp3" type="audio/mpeg">
</audio>

<script src="script.js"></script>
</body>
</html>
